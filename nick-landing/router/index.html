<script>
  // Split test router - assigns variant and redirects
  (function() {
    const VARIANTS = {
      'a': 'https://variant-a-orpin.vercel.app',
      'b': 'https://variant-b-ebon.vercel.app',
      'c': 'https://variant-c-eight.vercel.app'
    };

    // Check if user already has a variant assigned
    let variant = localStorage.getItem('nick_variant');
    
    if (!variant) {
      // Random assignment: 33% each
      const rand = Math.random();
      if (rand < 0.333) variant = 'a';
      else if (rand < 0.666) variant = 'b';
      else variant = 'c';
      localStorage.setItem('nick_variant', variant);
    }

    // Track in PostHog
    posthog.capture('split_test_variant', { 
      variant: variant,
      variant_url: VARIANTS[variant]
    });

    // Redirect to variant
    window.location.replace(VARIANTS[variant]);
  })();
